<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 48" fill="none">
  <defs>
    <linearGradient id="wbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <linearGradient id="waccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0c2e0"/>
      <stop offset="100%" stop-color="#8ba6d1"/>
