  </defs>
  <!-- Glass-effect rounded square -->
  <rect x="2" y="2" width="44" height="44" rx="14" fill="url(#wbg)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Heart -->
  <path d="M24 34 C18 28, 11 24, 11 19 C11 15, 14 13, 17.5 13 C20 13, 22.5 15, 24 17 C25.5 15, 28 13, 30.5 13 C34 13, 37 15, 37 19 C37 24, 30 28, 24 34Z" fill="white" opacity="0.95"/>
