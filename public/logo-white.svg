  <circle cx="42" cy="12" r="1.5" fill="url(#waccent)" opacity="0.35"/>
  <!-- Refined thin serif text -->
  <text x="56" y="25" font-family="Cormorant Garamond, Georgia, serif" font-size="22" font-weight="600" font-style="italic" fill="white" letter-spacing="0.5">My Therapist</text>
  <text x="56" y="43" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="url(#waccent)" letter-spacing="3.5">CARES</text>
